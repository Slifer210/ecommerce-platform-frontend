<div class="max-w-3xl mx-auto px-6 py-10">

    <!-- FORMULARIO -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm mb-10">

        <div class="p-6 md:p-8">

        <!-- HEADER -->
        <div class="mb-6">
            <h2 class="text-lg font-semibold text-gray-900">
            Nueva dirección
            </h2>

            <p class="text-sm text-gray-500 mt-1">
            Agrega una dirección para tus envíos o facturación.
            </p>
        </div>

        <!-- CAMPOS -->
        <div class="space-y-6">

            <!-- AUTOCOMPLETE -->
            <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Dirección
            </label>

            <app-address-autocomplete
                (addressSelected)="onAutocomplete($event)">
            </app-address-autocomplete>
            </div>

            <!-- REFERENCIA -->
            <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Referencia
            </label>

            <input
                type="text"
                placeholder="Ej. Casa, Oficina, Departamento 302"
                class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm
                    focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent
                    transition"
                [(ngModel)]="form.reference"
            />
            </div>

        </div>

        <!-- FOOTER -->
        <div class="flex justify-end mt-8">

            <button
            (click)="save()"
            class="inline-flex items-center gap-2 px-6 py-2.5 bg-black text-white text-sm font-medium
                    rounded-lg hover:bg-gray-800 transition"
            >
            <svg xmlns="http://www.w3.org/2000/svg"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
                class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5 13l4 4L19 7"/>
            </svg>

            {{ editingIndex !== null ? 'Actualizar dirección' : 'Guardar dirección' }}

            </button>

        </div>

        </div>

    </div>



    <!-- LISTA DE DIRECCIONES -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">

        <div
        *ngFor="let a of addresses; let i = index"
        class="p-5 transition"
        [ngClass]="{
            'bg-green-50 border-l-4 border-green-500': a.isDefault,
            'hover:bg-gray-50 border-b last:border-b-0 border-gray-200': !a.isDefault
        }"
        >

        <div class="flex items-start justify-between gap-6">

            <!-- ADDRESS INFO -->
            <div class="flex-1 min-w-0 space-y-2">

            <!-- HEADER -->
            <div class="flex items-start gap-2">

                <!-- ICONO -->
                <span
                *ngIf="a.isDefault"
                class="text-green-600 mt-0.5 flex-shrink-0"
                >
                <svg xmlns="http://www.w3.org/2000/svg"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                    class="w-5 h-5">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
                </span>

                <!-- DIRECCIÓN PRINCIPAL -->
                <span class="font-medium text-gray-900 break-words">
                {{ a.addressLine }}
                </span>

            </div>

            <!-- BADGE -->
            <div *ngIf="a.isDefault">
                <span
                class="inline-block text-xs bg-green-600 text-white px-3 py-1 rounded-full font-semibold"
                >
                Dirección principal
                </span>
            </div>

            <!-- UBICACIÓN (solo si existe) -->
            <p
                class="text-sm text-gray-500"
                *ngIf="a.district || a.province"
            >
                {{ a.district }}{{ a.district && a.province ? ', ' : '' }}{{ a.province }}
            </p>

            <!-- REFERENCIA -->
            <p
                class="text-xs text-gray-500"
                *ngIf="a.reference"
            >
                Ref: {{ a.reference }}
            </p>

            <!-- TEXTO INDICATIVO -->
            <p
                *ngIf="a.isDefault"
                class="text-xs text-green-700 font-medium"
            >
                Esta dirección se usará por defecto en su compra
            </p>

            </div>


            <!-- ACTIONS -->
            <div class="flex items-center gap-4 text-sm whitespace-nowrap flex-shrink-0">

            <button
                (click)="edit(i)"
                class="text-gray-600 hover:text-black transition"
            >
                Editar
            </button>

            <button
                (click)="remove(i)"
                class="text-gray-600 hover:text-red-600 transition"
            >
                Eliminar
            </button>

            <button
                *ngIf="!a.isDefault"
                (click)="setDefault(i)"
                class="text-green-600 hover:text-green-800 transition font-medium"
            >
                Hacer principal
            </button>

            </div>

        </div>

        </div>

    </div>

</div>
