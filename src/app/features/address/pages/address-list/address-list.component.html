<div class="max-w-3xl mx-auto p-6">

    <h2 class="text-2xl font-semibold mb-6">
        Mis direcciones
    </h2>

    <!-- FORM -->
    <div class="bg-white border rounded-lg p-4 mb-6 shadow-sm">

        <app-address-autocomplete
        (addressSelected)="onAutocomplete($event)">
        </app-address-autocomplete>

        <input
        type="text"
        placeholder="Referencia"
        class="border px-4 py-2 w-full mt-3 rounded"
        [(ngModel)]="form.reference"
        />

        <button
        class="mt-4 px-5 py-2 bg-black text-white rounded hover:bg-gray-800"
        (click)="save()">
        {{ editingIndex !== null ? 'Actualizar' : 'Guardar' }}
        </button>
    </div>

    <!-- LISTA -->
    <div class="bg-white border rounded-lg shadow-sm">

        <div
        *ngFor="let a of addresses; let i = index"
        class="border-b last:border-b-0 p-4"
        >

        <div class="flex justify-between items-start">

            <div>
            <div class="font-medium">
                {{ a.addressLine }}
                <span *ngIf="a.isDefault"
                    class="ml-2 text-green-600 text-sm">
                (Principal)
                </span>
            </div>

            <div class="text-sm text-gray-600">
                {{ a.district }}, {{ a.province }}
            </div>
            </div>

            <div class="flex gap-3 text-sm">
            <button (click)="edit(i)" class="text-blue-600 hover:underline">
                Editar
            </button>
            <button (click)="remove(i)" class="text-red-600 hover:underline">
                Eliminar
            </button>
            <button (click)="setDefault(i)" class="text-green-600 hover:underline">
                Usar por defecto
            </button>
            </div>

        </div>
        </div>

    </div>

</div>
