<div class="flex h-screen bg-gray-100 overflow-hidden">


    <!-- ========================= -->
    <!-- SIDEBAR -->
    <!-- ========================= -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col shrink-0">

        <!-- HEADER -->
        <div class="p-4 text-xl font-bold border-b border-gray-700 flex items-center gap-2">
        <!-- icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.75 3h4.5M9 6h6m-7.5 3h9m-9 3h9m-9 3h9M4.5 6.75h.008v.008H4.5V6.75z" />
        </svg>
        Admin Panel
        </div>

        <!-- MENU -->
        <nav class="flex-1 p-4 flex flex-col gap-1 overflow-y-auto text-sm">

        <!-- Dashboard -->
        <a
            routerLink="/admin/dashboard"
            routerLinkActive="bg-gray-700"
            class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h7v7H3V3zm11 0h7v11h-7V3zM3 14h7v7H3v-7zm11 11h7v-7h-7v7z" />
            </svg>
            Dashboard
        </a>

        <!-- Orders -->
        <a
            routerLink="/admin/orders"
            routerLinkActive="bg-gray-700"
            class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6M5 6h14l1 14H4L5 6z" />
            </svg>
            Órdenes
        </a>

        <!-- Customers (extra útil, NO overengineering) -->
        <a
            routerLink="/admin/customers"
            routerLinkActive="bg-gray-700"
            class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a4 4 0 00-4-4h-1m-6 6H2v-2a4 4 0 014-4h1m6-6a4 4 0 110-8 4 4 0 010 8zm6 2a3 3 0 100-6 3 3 0 000 6z" />
            </svg>
            Clientes
        </a>

        <!-- Preguntas y respuestas al Customer-->
        <a
        routerLink="/admin/questions"
        routerLinkActive="bg-gray-700"
        class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 10h8m-8 4h6m2 4H6a2 2 0 01-2-2V6a2 2 0 012-2h12a2 2 0 012 2v8" />
            </svg>
            Preguntas

            <span
                *ngIf="badgeCount > 0"
                class="bg-red-600 text-white text-xs px-2 py-0.5 rounded-full"
            >
                {{ badgeCount }}
            </span>
        </a>

        <!-- Products -->
        <a
            routerLink="/admin/products"
            routerLinkActive="bg-gray-700"
            class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20 13V7a2 2 0 00-2-2h-4V3H10v2H6a2 2 0 00-2 2v6m16 0l-8 5-8-5" />
            </svg>
            Productos
        </a>

        <!-- Categories -->
        <a
            routerLink="/admin/categories"
            routerLinkActive="bg-gray-700"
            class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            Categorías
        </a>

        <!-- Reports -->
        <a
            routerLink="/admin/reports"
            routerLinkActive="bg-gray-700"
            class="flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-700 transition"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 17v-6m4 6V7m4 10V4" />
            </svg>
            Reportes
        </a>

        </nav>

        <!-- VISTA PÚBLICA -->
        <a
        routerLink="/products"
        class="mx-4 mb-3 flex items-center gap-3 px-3 py-2 rounded
                border border-indigo-500 text-indigo-400
                hover:bg-indigo-500 hover:text-white transition text-sm"
        >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v18m9-9H3" />
        </svg>
        Ver tienda pública
        </a>



        <!-- LOGOUT -->
        <div class="p-4 border-t border-gray-700">
        <button
            class="w-full flex items-center justify-center gap-2 px-3 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition text-sm"
            (click)="logout()"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
            </svg>
            Cerrar sesión
        </button>
        </div>

        <!-- FOOTER -->
        <div class="p-4 border-t border-gray-700 text-xs text-gray-400 text-center">
        E-Shop Admin
        </div>

    </aside>

    <!-- ========================= -->
    <!-- CONTENT -->
    <!-- ========================= -->
    <main class="flex-1 p-6 overflow-x-hidden overflow-y-auto">
        <router-outlet></router-outlet>
    </main>

</div>
