<h1 class="text-2xl font-semibold mb-6">
  Preguntas de clientes
</h1>

    <!-- 🔍 BUSCADOR -->
    <input
    type="text"
    [(ngModel)]="search"
    placeholder="Buscar por pregunta o producto..."
    class="border rounded px-3 py-2 mb-6 w-full"
    />

    <!-- LOADING -->
    <div *ngIf="loading" class="text-gray-500">
    Cargando preguntas...
    </div>

    <!-- EMPTY -->
    <div *ngIf="!loading && filteredQuestions.length === 0" class="text-gray-500">
    No hay preguntas pendientes 🎉
    </div>

    <!-- LISTA -->
    <div
    *ngFor="let q of filteredQuestions"
    class="bg-white p-4 rounded shadow mb-4"
    >

    <!-- PRODUCTO -->
    <p class="text-sm text-gray-600 mb-1">
        <strong>Producto:</strong>
        <a
            [routerLink]="['/products', q.productId]"
            class="text-indigo-600 hover:underline"
            title="Ver producto en la vista general"
        >
            {{ q.productName }}
            <span class="text-xs text-gray-500">(ver)</span>
        </a>
    </p>


    <!-- CLIENTE -->
    <p class="text-sm text-gray-600 mb-1">
        <strong>Cliente:</strong> {{ q.authorName }}
    </p>

    <!-- PREGUNTA -->
    <p class="text-gray-900 mb-4">
        {{ q.question }}
    </p>

    <!-- RESPUESTA -->
    <textarea
        #answerInput
        rows="3"
        class="w-full border rounded p-2 mb-2"
        placeholder="Escribe la respuesta..."
    ></textarea>

    <button
        class="bg-black text-white px-4 py-2 rounded disabled:opacity-50"
        (click)="answer(q.id, answerInput.value); answerInput.value=''"
    >
        Responder
    </button>

</div>
