<div class="mt-6 border-t pt-4">
  <h3 class="font-semibold mb-2">Imágenes</h3>

  <!-- SUBIR ARCHIVO -->
  <input
    type="file"
    accept="image/*"
    (change)="upload($event)"
    class="mb-3"
  />

  <div *ngIf="loading" class="text-sm text-gray-500">
    Subiendo imagen...
  </div>

  <!-- LISTADO -->
  <div class="flex gap-3 flex-wrap">
    <div
      *ngFor="let img of images"
      class="relative border rounded p-1 w-28"
      [class.border-blue-600]="img.main"
    >
      <img
        [src]="img.imageUrl"
        class="w-24 h-24 object-cover rounded"
      />

      <!-- MARCA PRINCIPAL -->
      <span
        *ngIf="img.main"
        class="absolute bottom-1 left-1 bg-blue-600 text-white text-[10px] px-1 rounded"
      >
        Principal
      </span>

      <!-- BOTÓN ELIMINAR -->
      <button
        class="absolute top-1 right-1 bg-red-600 text-white text-xs rounded px-1"
        (click)="remove(img.id)"
      >
        ✕
      </button>

      <!-- BOTÓN MARCAR PRINCIPAL -->
      <button
        *ngIf="!img.main"
        class="mt-1 w-full text-xs bg-gray-200 rounded py-0.5 hover:bg-blue-100"
        (click)="setMain(img.id)"
      >
        Marcar principal
      </button>
    </div>
  </div>
</div>
