<h1 class="text-2xl font-bold mb-4">Productos</h1>

<!-- ========================= -->
<!-- FILTROS -->
<!-- ========================= -->
<div class="flex flex-wrap gap-3 mb-4 items-center">

    <!-- BUSCADOR -->
    <input
        type="text"
        placeholder="Buscar por nombre..."
        class="border px-3 py-2 rounded w-64"
        [(ngModel)]="searchTerm"
        (ngModelChange)="applyFilters()"
    />

    <!-- FILTRO DE CATEGORÍAS (JERÁRQUICO) -->
    <select
        class="border px-3 py-2 rounded"
        [(ngModel)]="selectedCategoryId"
        (change)="applyFilters()"
    >
        <option value="">Todas las categorías</option>

        <ng-container *ngFor="let parent of parentCategories">
            <option disabled>
                📁 {{ parent.name }}
            </option>

            <option
                *ngFor="let child of getChildren(parent.id)"
                [value]="child.id"
            >
                &nbsp;&nbsp;↳ {{ child.name }}
            </option>
        </ng-container>
    </select>

    <!-- FILTRO ESTADO -->
    <div class="flex gap-2">
        <button
            class="px-3 py-2 rounded border"
            (click)="onStatusChange('ALL')"
        >
            Todos
        </button>

        <button
            class="px-3 py-2 rounded border text-green-700"
            (click)="onStatusChange('ACTIVE')"
        >
            Activos
        </button>

        <button
            class="px-3 py-2 rounded border text-red-700"
            (click)="onStatusChange('INACTIVE')"
        >
            Inactivos
        </button>
    </div>

    <div class="ml-auto flex items-center gap-3">

        <!-- EXPORT -->
        <select
            (change)="onExportChange($event)"
            class="px-3 py-2 text-sm rounded-lg
                border border-gray-200
                bg-white text-gray-700
                shadow-sm
                hover:border-gray-300
                focus:outline-none
                focus:ring-2 focus:ring-indigo-500
                focus:border-indigo-500
                transition"
        >
            <option value="">Exportar</option>
            <option value="csv">CSV</option>
            <option value="xlsx">Excel</option>
            <option value="pdf">PDF</option>
        </select>

        <!-- NUEVO PRODUCTO -->
        <button
            (click)="newProduct()"
            class="px-4 py-2 text-sm font-medium
                bg-indigo-600 text-white
                rounded-lg
                shadow-sm
                hover:bg-indigo-700
                focus:outline-none
                focus:ring-2 focus:ring-indigo-500
                focus:ring-offset-1
                transition"
        >
            Nuevo producto
        </button>

    </div>
</div>

<!-- ========================= -->
<!-- TABLA -->
<!-- ========================= -->
<table
    *ngIf="!loading && filteredProducts.length > 0"
    class="w-full border border-gray-300 text-sm bg-white"
>
    <thead class="bg-gray-100">
        <tr>
            <th class="p-2 border">Producto</th>
            <th class="p-2 border">Precio</th>
            <th class="p-2 border">Stock</th>
            <th class="p-2 border">Categorías</th>
            <th class="p-2 border">Estado</th>
            <th class="p-2 border">Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr *ngFor="let product of filteredProducts">

            <!-- PRODUCTO -->
            <td class="p-2 border">
                <div class="flex items-center gap-3">
                    <img
                        *ngIf="product.mainImageUrl"
                        [src]="product.mainImageUrl"
                        class="w-10 h-10 object-cover rounded border"
                    />
                    <div>
                        <div class="font-medium">{{ product.name }}</div>
                        <div class="text-xs text-gray-500">
                            {{ product.description }}
                        </div>
                    </div>
                </div>
            </td>

            <td class="p-2 border">S/ {{ product.price }}</td>
            <td class="p-2 border">{{ product.stock }}</td>

            <!-- CATEGORÍAS (JERÁRQUICAS) -->
            <td class="p-2 border">
                <div
                    *ngFor="let c of product.categories"
                    class="inline-flex items-center text-xs bg-gray-200 rounded px-2 py-0.5 mr-1 mb-1"
                >
                    📁 {{ getCategoryPath(c) }}
                </div>

                <span
                    *ngIf="!product.categories.length"
                    class="text-xs text-gray-400"
                >
                    Sin categorías
                </span>
            </td>

            <!-- ESTADO -->
            <td class="p-2 border font-semibold">
                <span
                    [ngClass]="product.active ? 'text-green-600' : 'text-red-600'"
                >
                    {{ product.active ? 'Activo' : 'Inactivo' }}
                </span>
            </td>

            <!-- ACCIONES -->
            <td class="p-2 border space-x-2">
                <button
                    class="px-2 py-1 bg-yellow-500 text-white rounded"
                    (click)="edit(product)"
                >
                    Editar
                </button>

                <button
                    class="px-2 py-1 bg-gray-600 text-white rounded"
                    (click)="openCategories(product)"
                >
                    ⚙️ Categorías
                </button>

                <button
                    class="px-2 py-1 rounded text-white"
                    [ngClass]="product.active ? 'bg-red-600' : 'bg-green-600'"
                    (click)="toggleStatus(product)"
                >
                    {{ product.active ? 'Desactivar' : 'Activar' }}
                </button>
            </td>

        </tr>
    </tbody>
</table>

<div
    *ngIf="!loading && filteredProducts.length === 0"
    class="text-gray-500"
>
    No hay productos con esos filtros.
</div>

<!-- ========================= -->
<!-- MODALES -->
<!-- ========================= -->
<app-admin-product-modal
    *ngIf="showModal"
    [product]="selectedProduct"
    (save)="save($event)"
    (close)="showModal = false"
></app-admin-product-modal>

<app-admin-product-categories-modal
    *ngIf="showCategories"
    [productId]="selectedProduct!.id"
    (close)="showCategories = false; loadProductsAndCategories()"


></app-admin-product-categories-modal>
