<app-auth-layout>

    <!-- Title -->
    <div class="flex flex-col items-center mb-8">
        <h1
        class="text-[#0d131b]
                tracking-tight
                text-[32px]
                font-bold
                leading-tight
                text-center
                pb-2"
        >
        Iniciar sesión
        </h1>
        <p class="text-[#4c6c9a] text-sm font-normal text-center">
        Accede a tu cuenta para continuar comprando
        </p>
    </div>

    <!-- Form -->
    <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="flex flex-col gap-5"
    >

        <!-- Email -->
        <div class="flex flex-col gap-2">
        <label class="text-[#0d131b] text-base font-medium">
            Correo electrónico
        </label>
        <input
            type="email"
            formControlName="email"
            placeholder="ejemplo@correo.com"
            class="form-input w-full h-14 rounded-lg border border-[#cfd9e7]
                bg-white p-[15px] text-base placeholder:text-[#4c6c9a]
                focus:ring-2 focus:ring-[#136dec]/20 focus:border-[#136dec]"
        />
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-2">
        <label class="text-[#0d131b] text-base font-medium">
            Contraseña
        </label>
        <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="form-input w-full h-14 rounded-lg border border-[#cfd9e7]
                bg-white p-[15px] text-base placeholder:text-[#4c6c9a]
                focus:ring-2 focus:ring-[#136dec]/20 focus:border-[#136dec]"
        />
        </div>

        <div class="text-right">
            <a
                routerLink="/auth/forgot-password"
                class="text-sm text-[#136dec] hover:underline">
                ¿Olvidaste tu contraseña?
            </a>
        </div>


        <!-- Login Button -->
        <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full h-14 rounded-lg bg-[#136dec] text-white
                font-bold shadow-md hover:bg-[#136dec]/90
                disabled:opacity-50"
        >
        Ingresar
        </button>

    </form>

    <!-- Divider -->
    <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
        <span class="bg-white px-4 text-[#4c6c9a]">
            O continúa con
        </span>
        </div>
    </div>

    <!-- Google Button -->
    <button
        type="button"
        (click)="loginWithGoogle()"
        class="w-full h-14 rounded-lg border border-[#cfd9e7]
            flex items-center justify-center gap-3
            hover:bg-slate-50 transition-colors"
    >
        <img
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
        alt="Google"
        class="w-5 h-5"
        />
        <span class="text-sm font-medium text-slate-700">
        Continuar con Google
        </span>
    </button>

    <!-- Footer -->
    <div class="mt-10 text-center">
        <p class="text-[#4c6c9a] text-sm">
        ¿No tienes una cuenta?
        <a routerLink="/auth/register" class="text-[#136dec] font-bold hover:underline">
            Regístrate gratis
        </a>
        </p>
    </div>

</app-auth-layout>
