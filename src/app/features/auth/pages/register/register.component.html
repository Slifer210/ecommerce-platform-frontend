<app-auth-layout>

    <section class="auth-page">
        <div class="auth-page__intro">
            <span class="auth-page__eyebrow">Cuenta nueva</span>

            <div>
                <h1 class="auth-page__title">Crear cuenta</h1>
                <p class="auth-page__subtitle">
                    Guarda tus direcciones, sigue tus compras y entra al checkout
                    con menos pasos.
                </p>
            </div>
        </div>

        <form
            [formGroup]="form"
            (ngSubmit)="submit()"
            class="auth-form"
        >
            <div class="auth-grid-fields">
                <div class="auth-field">
                    <label class="auth-field__label" for="register-first-name">
                        <span>Nombres</span>
                        <span class="auth-field__tag">Perfil</span>
                    </label>

                    <div class="auth-input-shell">
                        <span class="auth-input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path>
                                <path d="M5 20a7 7 0 0 1 14 0"></path>
                            </svg>
                        </span>

                        <input
                            id="register-first-name"
                            type="text"
                            formControlName="firstName"
                            autocomplete="given-name"
                            placeholder="Tus nombres"
                            class="auth-input"
                        />
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-field__label" for="register-last-name">
                        <span>Apellidos</span>
                        <span class="auth-field__tag">Perfil</span>
                    </label>

                    <div class="auth-input-shell">
                        <span class="auth-input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path>
                                <path d="M5 20a7 7 0 0 1 14 0"></path>
                            </svg>
                        </span>

                        <input
                            id="register-last-name"
                            type="text"
                            formControlName="lastName"
                            autocomplete="family-name"
                            placeholder="Tus apellidos"
                            class="auth-input"
                        />
                    </div>
                </div>
            </div>

            <div class="auth-field">
                <label class="auth-field__label" for="register-email">
                    <span>Correo electr&oacute;nico</span>
                    <span class="auth-field__tag">Requerido</span>
                </label>

                <div class="auth-input-shell">
                    <span class="auth-input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 7.5 12 13l8-5.5"></path>
                            <rect x="3" y="5" width="18" height="14" rx="3"></rect>
                        </svg>
                    </span>

                    <input
                        id="register-email"
                        type="email"
                        formControlName="email"
                        autocomplete="email"
                        placeholder="ejemplo@correo.com"
                        class="auth-input"
                    />
                </div>
            </div>

            <div class="auth-field">
                <label class="auth-field__label" for="register-password">
                    <span>Contrase&ntilde;a</span>
                    <span class="auth-field__tag">Segura</span>
                </label>

                <div class="auth-input-shell">
                    <span class="auth-input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                            <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                            <circle cx="12" cy="15.5" r="1"></circle>
                        </svg>
                    </span>

                    <input
                        id="register-password"
                        type="password"
                        formControlName="password"
                        autocomplete="new-password"
                        placeholder="Crea una contrase&ntilde;a"
                        class="auth-input"
                    />
                </div>
            </div>

            <div class="auth-form__meta">
                <span class="auth-form__meta-copy">Tus datos se envian de forma segura</span>
                <span class="auth-field__tag">Proteccion activa</span>
            </div>

            <button
                type="submit"
                [disabled]="form.invalid || loading"
                class="auth-primary-btn"
            >
                Registrar cuenta
            </button>
        </form>

        <p *ngIf="success" class="auth-message auth-message--success">
            Registro exitoso. Revisa tu correo para verificar tu cuenta.
        </p>

        <p *ngIf="errorMessage" class="auth-message auth-message--error">
            {{ errorMessage }}
        </p>

        <div class="auth-footer-note">
            <p>
                &iquest;Ya tienes cuenta?
                <a routerLink="/auth/login" class="auth-link">Inicia sesi&oacute;n</a>
            </p>
        </div>
    </section>

</app-auth-layout>
