<div class="max-w-3xl mx-auto p-6 space-y-6">

    <h1 class="text-2xl font-bold">
        Tu carrito
    </h1>

    <!-- SKELETON LOADING -->
    <div *ngIf="cartState.loading()" class="space-y-4">
        <div
        *ngFor="let _ of [1,2,3]"
        class="h-16 bg-gray-200 rounded animate-pulse"
        ></div>
    </div>

    <!-- CONTENT -->
    <ng-container *ngIf="!cartState.loading() && cartState.cart() as cart">

        <!-- EMPTY CART -->
        <div
        *ngIf="cart.items.length === 0"
        class="flex flex-col items-center justify-center py-20 text-center"
        >

            <!-- ICON -->
            <div class="mb-6 text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    class="w-20 h-20">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 2.25h1.386a1.5 1.5 0 011.415 1.03l.383 1.15M7.5 14.25h8.25a1.5 1.5 0 001.46-1.155l1.38-5.52H5.318m2.182 6.675L5.318 4.43M7.5 14.25L6.75 18h10.5m-9.75 0a.75.75 0 100 1.5.75.75 0 000-1.5zm9 0a.75.75 0 100 1.5.75.75 0 000-1.5z" />
                </svg>
            </div>

            <!-- TITLE -->
            <h2 class="text-xl font-semibold text-gray-700 mb-2">
                Tu carrito está vacío
            </h2>

            <!-- SUBTEXT -->
            <p class="text-gray-500 mb-6 max-w-md">
                Parece que aún no has agregado productos a tu carrito.
                Explora nuestro catálogo y encuentra algo que te guste.
            </p>

            <!-- CTA -->
            <button
            type="button"
            [routerLink]="['/products']"
            class="px-6 py-3 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition"
            >
            Explorar productos
            </button>

        </div>

        <!-- ITEMS -->
        <div
        *ngIf="cart.items.length > 0"
        class="space-y-4"
        >

        <div
            *ngFor="let item of cart.items"
            class="flex justify-between items-center border-b py-3"
        >
            <div>
            <div class="font-semibold">
                {{ item.productName }}
            </div>
            <div class="text-sm text-gray-600">
                S/ {{ item.unitPrice }} c/u
            </div>
            </div>

            <div class="flex items-center gap-3">
            <!-- DECREASE -->
            <button
                class="px-2 py-1 border rounded disabled:opacity-50"
                [disabled]="item.quantity === 1"
                (click)="decrease(item.productId)"
                >
                −
            </button>

            <span class="min-w-[24px] text-center">
                {{ item.quantity }}
            </span>

            <!-- INCREASE -->
            <button
                class="px-2 py-1 border rounded"
                (click)="increase(item.productId)"
            >
                +
            </button>

            <div class="font-bold ml-4">
                S/ {{ item.totalPrice }}
            </div>

            <button
                class="text-red-600 text-sm ml-4"
                (click)="removeItem(item.productId)"
            >
                Quitar
            </button>
            </div>
        </div>

        <!-- TOTAL -->
        <div class="mt-6 flex justify-between font-bold text-lg">
            <span>Total</span>
            <span>S/ {{ cart.totalAmount }}</span>
        </div>

        <!-- ACTIONS -->
        <div class="mt-6 flex gap-4">
            <button
            class="bg-gray-200 px-4 py-2 rounded"
            (click)="clearCart()"
            >
            Vaciar carrito
            </button>

            <button
            class="bg-black text-white px-4 py-2 rounded disabled:opacity-50"
            [disabled]="cart.items.length === 0"
            (click)="goToCheckout()"
            >
            Continuar al pago
            </button>
        </div>

        </div>
    </ng-container>
</div>
