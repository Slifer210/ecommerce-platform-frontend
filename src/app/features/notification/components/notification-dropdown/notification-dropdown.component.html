<div class="relative flex flex-col items-center text-gray-700 hover:text-black">

    <!-- BOTÓN CAMPANA -->
    <button
        type="button"
        (click)="toggle(); $event.stopPropagation()"
        class="relative flex flex-col items-center focus:outline-none"
    >
        <!-- ICONO -->
        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11
                a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341
                C7.67 6.165 6 8.388 6 11v3.159
                c0 .538-.214 1.055-.595 1.436L4 17h5
                m6 0a3 3 0 11-6 0h6z"/>
        </svg>

        <!-- TEXTO -->
        <span class="text-xs">Notificaciones</span>

        <!-- BADGE -->
        <span
            *ngIf="notificationState.unreadCount() > 0"
            class="absolute -top-1 -right-2 bg-black text-white text-xs rounded-full px-1.5"
            >
            {{ notificationState.unreadCount() }}
        </span>

    </button>

    <!-- DROPDOWN -->
    <div
        *ngIf="open"
        class="absolute right-0 top-full mt-2 w-80 bg-white border rounded-lg shadow-lg z-50"
    >

        <div
        *ngIf="notificationState.dropdownNotifications().length === 0"
        class="p-4 text-sm text-gray-500"
        >
            No tienes notificaciones
        </div>

        <div
        *ngFor="let n of notificationState.dropdownNotifications()"
        (click)="openNotification(n, $event)" 
        class="p-3 border-b last:border-b-0 cursor-pointer hover:bg-gray-50"
        [class.font-semibold]="!n.read"
        >

            <div class="text-sm text-gray-800">
                {{ n.title }}
            </div>

            <div class="text-xs text-gray-600">
                {{ n.message }}
            </div>
        </div>

        <!-- VER TODAS -->
        <button
        type="button"
        (click)="goToAll($event)"
        class="w-full text-center text-sm py-2 text-gray-600 hover:text-black hover:bg-gray-100 border-t"
        >
        Ver todas las notificaciones
        </button>
    </div>   
</div>
