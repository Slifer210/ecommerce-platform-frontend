<div class="max-w-5xl mx-auto p-6 space-y-6">

    <h1 class="text-2xl font-bold">
        Mis órdenes
    </h1>

    <!-- LOADING -->
    <div *ngIf="loading()" class="text-gray-500">
        Cargando órdenes...
    </div>

    <!-- EMPTY -->
    <div *ngIf="!loading() && orders().length === 0"
        class="text-center text-gray-500">
        Aún no has realizado ninguna compra 🛒
    </div>

    <!-- LIST -->
    <div *ngIf="orders().length > 0"
        class="space-y-4">

        <div *ngFor="let order of orders()"
            class="bg-white border rounded p-4 shadow-sm
                    flex justify-between items-center
                    cursor-pointer hover:bg-gray-50"
            (click)="goToOrderDetail(order.orderId)">

            <div>
                <div class="font-semibold">
                    Orden {{ order.orderId | slice:0:8 }}
                </div>

                <div class="text-sm text-gray-600">
                    {{ order.createdAt | date:'mediumDate' }}
                    · {{ order.itemsCount }} productos
                </div>
            </div>

            <div class="text-right">

                <div class="font-bold">
                    S/ {{ order.total | number:'1.2-2' }}
                </div>

                <div class="text-sm"
                    [class.text-green-600]="order.status === 'PAID'"
                    [class.text-yellow-600]="order.status === 'PROCESSING'">

                    {{ statusLabel(order.status) }}

                </div>

                <!-- BOTON CONTINUAR PAGO -->
                <button
                    *ngIf="order.status === 'PROCESSING' && order.paymentInitPoint"
                    (click)="continuePayment(order.paymentInitPoint!); $event.stopPropagation()"
                    class="mt-2 px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">

                    Continuar pago

                </button>

            </div>

        </div>
    </div>
</div>
