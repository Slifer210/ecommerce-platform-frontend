<div class="flex gap-3">
  <div class="rounded-xl border border-gray-200 bg-gray-50 p-4 space-y-3">

    <!-- Label -->
    <span class="text-xs font-medium text-indigo-600">
      Responder como vendedor
    </span>

    <!-- Textarea -->
    <textarea
      [(ngModel)]="answer"
      placeholder="Escribe tu respuesta clara y directa…"
      rows="3"
      class="w-full resize-none rounded-lg border border-gray-300 bg-white
              px-4 py-3 text-sm text-gray-800
              placeholder-gray-400
              focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20
              transition"
    ></textarea>

    <!-- Footer -->
    <div class="flex items-center justify-between">
      <span class="text-xs text-gray-400">
        {{ answer.length }} caracteres
      </span>

      <button
        (click)="submit()"
        [disabled]="!answer.trim()"
        class="rounded-lg bg-indigo-600 px-4 py-2
               text-xs font-medium text-white
               hover:bg-indigo-700
               disabled:opacity-50 disabled:cursor-not-allowed
               transition"
      >
        Responder
      </button>
    </div>

  </div>
</div>
