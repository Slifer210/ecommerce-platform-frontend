<div class="flex items-center gap-3 text-sm text-gray-600">
    <span>¿Te resultó útil?</span>

    <button
        class="flex items-center gap-1 border rounded-full px-3 py-1 transition"
        [class.bg-blue-50]="review.votedHelpful === true"
        [class.border-blue-400]="review.votedHelpful === true"
        (click)="toggleVote()">
        👍
        <span>{{ review.helpfulCount }}</span>
    </button>
</div>
