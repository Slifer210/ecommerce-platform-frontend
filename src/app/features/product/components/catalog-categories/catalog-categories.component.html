<div>
  <h2 class="font-semibold mb-2">Categorías</h2>

  <!-- TODAS -->
  <button
    *ngIf="catalogState.isSearchActive()"
    class="block w-full text-left px-2 py-1 rounded"
    [class.bg-black]="!activeCategoryId"
    [class.text-white]="!activeCategoryId"
    (click)="selectCategory(null)"
  >
    Todas
  </button>

  <!-- ROOT CATEGORIES -->
  <ng-container *ngFor="let c of rootCategories">
    <div class="pl-1 mt-1">

      <div class="flex items-center gap-2">

        <!-- EXPAND -->
        <button
          class="text-sm"
          (click)="toggleCategory(c.id)"
        >
          {{ isExpanded(c.id) ? '▾' : '▸' }}
        </button>

        <!-- CATEGORY -->
        <button
          class="flex-1 text-left px-2 py-1 rounded"
          [class.bg-black]="activeCategoryId === c.id"
          [class.text-white]="activeCategoryId === c.id"
          (click)="selectCategory(c.id)"
        >
          {{ c.name }}
        </button>

        <!-- FACET COUNT -->
        <span
          *ngIf="catalogState.isSearchActive()"
          class="text-xs text-gray-500"
        >
          ({{ getFacetCount(c.id) }})
        </span>

      </div>

      <!-- CHILD -->
      <div
        *ngIf="isExpanded(c.id)"
        class="ml-6 mt-1 space-y-1"
      >
        <button
          *ngFor="let child of categoryTree.get(c.id)"
          class="block w-full text-left px-2 py-1 rounded text-sm"
          [class.bg-gray-200]="activeCategoryId === child.id"
          (click)="selectCategory(child.id)"
        >
          {{ child.name }}
        </button>
      </div>

    </div>
  </ng-container>
</div>
