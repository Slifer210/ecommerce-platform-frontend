<main class="catalog-page max-w-7xl mx-auto px-6 py-10">

  <div class="space-y-20">

    <!-- ================= HERO ================= -->
    <section
      *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && hero()"
      class="text-center max-w-3xl mx-auto space-y-6"
    >
      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight">
        {{ hero()?.title }}
      </h1>

      <p class="text-gray-500 text-lg leading-relaxed">
        {{ hero()?.subtitle }}
      </p>
    </section>

    <!-- ================= BANNERS ================= -->
    <app-catalog-banner-carousel
      *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && banners().length > 0"
      [banners]="banners()"
    ></app-catalog-banner-carousel>


    <!-- ================= QUICK CATEGORIES ================= -->
    <section
      *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && homeCategories().length > 0"
      class="flex justify-center"
    >
      <div class="flex flex-wrap justify-center gap-4 max-w-4xl">
        <button
          *ngFor="let c of homeCategories()"
          (click)="onCategorySelect(c.id)"
          class="px-5 py-2.5 text-sm font-medium
                 bg-gray-100 rounded-full
                 transition hover:bg-black hover:text-white"
        >
          {{ c.name }}
        </button>
      </div>
    </section>


    <!-- ================= VER TODOS ================= -->
    <section
      *ngIf="!exploreMode() && !catalogState.hasActiveFilters()"
      class="flex justify-center pt-4"
    >
      <button
        (click)="goToExploreMode()"
        class="group inline-flex items-center gap-2 text-sm font-medium
               text-gray-600 transition hover:text-black"
      >
        Ver todos los productos

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 transition-transform duration-200 group-hover:translate-x-1"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </section>


    <!-- ================= SECTIONS ================= -->

    <div class="space-y-28">

      <!-- TRENDING -->
      <app-product-slider-section
        *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && trending().length > 0"
        title="Tendencia ahora"
        subtitle="Lo más buscado en este momento"
        [products]="trending()"
        (productClick)="goToProduct($event)"
        (addToCartClick)="addToCart($event)"
      >
        <svg icon xmlns="http://www.w3.org/2000/svg"
            fill="currentColor"
            viewBox="0 0 24 24"
            class="h-5 w-5">
          <path d="M12 2C9 6 5 8 5 13a7 7 0 1014 0c0-3-2-5-4-7 0 3-1 5-3 6-1-2-1-5 0-10z"/>
        </svg>
      </app-product-slider-section>


      <!-- BEST SELLERS -->
      <app-product-slider-section
        *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && bestSellers().length > 0"
        title="Más vendidos"
        subtitle="Los productos preferidos por nuestros clientes"
        [products]="bestSellers()"
        (productClick)="goToProduct($event)"
        (addToCartClick)="addToCart($event)"
      >
        <svg icon xmlns="http://www.w3.org/2000/svg"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            class="h-5 w-5">
          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 2l1 4h10l1-4M4 6h16l-1.5 14h-13L4 6z"/>
        </svg>
      </app-product-slider-section>


      <!-- NEW PRODUCTS -->
      <app-product-slider-section
        *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && newProducts().length > 0"
        title="Nuevos productos"
        subtitle="Últimos productos añadidos al catálogo"
        [products]="newProducts()"
        (productClick)="goToProduct($event)"
        (addToCartClick)="addToCart($event)"
      >
        <svg icon xmlns="http://www.w3.org/2000/svg"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            class="h-5 w-5">
          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v6m0 0l2-2m-2 2L10 7m2 6v8m6-6H6"/>
        </svg>
      </app-product-slider-section>


      <!-- TOP RATED -->
      <app-product-slider-section
        *ngIf="!exploreMode() && !catalogState.hasActiveFilters() && topRated().length > 0"
        title="Mejor valorados"
        subtitle="Productos con las mejores reseñas"
        [products]="topRated()"
        (productClick)="goToProduct($event)"
        (addToCartClick)="addToCart($event)"
      >
        <svg icon xmlns="http://www.w3.org/2000/svg"
            fill="currentColor"
            viewBox="0 0 24 24"
            class="h-5 w-5">
          <path d="M12 2l2.9 6.9 7.5.6-5.7 4.8 1.7 7.2L12 18l-6.4 3.5 1.7-7.2L1.6 9.5l7.5-.6L12 2z"/>
        </svg>
      </app-product-slider-section>

    </div>

  </div>

  
  <!-- ================= MAIN LAYOUT ================= -->
  <section 
    *ngIf="exploreMode() || catalogState.hasActiveFilters() || catalogState.searchApplied()"
    class="grid grid-cols-1 gap-12"
    [ngClass]="{
      'md:grid-cols-4': products().length > 0,
      'md:grid-cols-1': products().length === 0
    }"
  >
    <!-- SIDEBAR -->
    <aside
      *ngIf="(catalogState.hasActiveFilters() || catalogState.searchApplied()) && products().length > 0"
      class="md:col-span-1"
    >
      <div class="sticky top-8 bg-white border border-gray-100 rounded-2xl shadow-sm p-6">
        <app-catalog-sidebar
          [rootCategories]="rootCategories()"
          [categoryTree]="categoryTree()"
          [activeCategoryId]="appliedCategoryId()"
          [detectedCategoryId]="detectedCategoryId()"
          [facetCount]="getFacetCount.bind(this)"
          [facetAttributes]="facetAttributes()"
          [facetPriceRanges]="facetPriceRanges()"
          [selectedAttributes]="selectedAttributes()"
          [minPrice]="appliedMinPrice()"
          [maxPrice]="appliedMaxPrice()"
          (attributeToggle)="onAttributeToggle($event)"
          (priceSelect)="onPriceSelect($event)"
          (clear)="clearSearchAndReset()"
          (categorySelect)="onCategorySelect($event)"
        ></app-catalog-sidebar>
      </div>
    </aside>


    <!-- CONTENT -->
    <section
      class="space-y-10"
      [ngClass]="{
        'md:col-span-3': catalogState.hasActiveFilters(),
        'md:col-span-4': !catalogState.hasActiveFilters()
      }"
    >

      <!-- TOP BAR -->
      <header class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">

        <app-breadcrumb
          [items]="breadcrumb()"
          (homeClick)="clearSearchAndReset()"
          (categoryClick)="onCategorySelect($event.toString())"
        ></app-breadcrumb>

        <span *ngIf="!loading()" class="text-sm text-gray-500">
          {{ totalElements() }} resultado(s)
        </span>

      </header>

      <!-- CONTROLS BAR -->
      <app-catalog-controls
          [loading]="loading()"
          [showingFrom]="showingFrom()"
          [showingTo]="showingTo()"
          [total]="totalElements()"
          [sortKey]="sortKey()"
          [pageSize]="pageSize()"
          (sortChange)="onSortChange($event)"
          (pageSizeChange)="onPageSizeChange($event)"
        ></app-catalog-controls>

      <!-- STATES -->
      <section class="space-y-10">

        <div
          *ngIf="loading()"
          class="py-20 text-sm text-center text-gray-400"
        >
          Cargando productos…
        </div>

        <div
          *ngIf="!loading() && products().length === 0"
          class="py-20 text-sm text-center text-gray-400"
        >
          No se encontraron productos
        </div>

        <div
          *ngIf="!loading() && products().length > 0"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12"
        >
          <app-product-card
            *ngFor="let p of products()"
            [product]="p"
            (productClick)="goToProduct($event)"
            (addToCartClick)="addToCart($event)"
          ></app-product-card>
        </div>

        <!-- PAGINATION -->
        <app-pagination
          *ngIf="!loading() && totalPages() > 1"
          [currentPage]="currentPage()"
          [totalPages]="totalPages()"
          [pages]="pageNumbers()"
          (pageChange)="goToPage($event)"
        ></app-pagination>

      </section>

    </section>

  </section>

</main>
